<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Acceso Muegano</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background: #000; color: #fff; font-family: sans-serif; }</style>
</head>
<body class="p-6 flex flex-col items-center">
    <h2 class="text-gold font-bold mb-8">ESCÁNER PUERTA BODA</h2>
    <div id="reader" style="width: 320px; border-radius: 20px; overflow: hidden; border: 4px solid #c59f51 !important;"></div>

    <div id="modal" class="hidden fixed inset-0 flex items-center justify-center bg-black/90 p-8">
         <div class="text-center">
             <div class="text-6xl mb-4">✅</div>
             <h3 id="nom-valida" class="text-2xl font-bold mb-2"></h3>
             <p id="pases-val" class="text-5xl text-[#c5a059] font-black mb-6"></p>
             <button onclick="resetScan()" class="bg-white text-black p-4 inline-block rounded font-bold">VALIDE ATRE RE-SCAN</button>
         </div>
    </div>

    <script>
        const scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 200 });
        scanner.render(onScanSuccess);

        function onScanSuccess(t) {
            if(t.includes("BODA-ACC")) {
                const parts = t.split('-');
                document.getElementById('nom-valida').innerText = parts[3].replace('ST:', '');
                document.getElementById('pases-val').innerText = parts[4].replace('C:', '') + " PASES";
                document.getElementById('modal').classList.remove('hidden');
            } else { alert("CROMADO NO VALIDO PARA ESTA BODA"); }
        }

        function resetScan() {
             document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
